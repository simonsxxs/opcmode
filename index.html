<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>One-Person Company 教程手册</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f3f6fb;
      --surface: #ffffff;
      --surface-soft: #f8fafc;
      --text: #0f172a;
      --muted: #64748b;
      --line: #dbe2ee;
      --brand: #2563eb;
      --brand-2: #0ea5e9;
      --accent: #f97316;
      --danger: #dc2626;
      --ok: #059669;
      --radius-lg: 18px;
      --radius-md: 12px;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --shadow-soft: 0 6px 18px rgba(15, 23, 42, 0.06);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Plus Jakarta Sans", "Noto Sans SC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(1000px 400px at -5% -10%, rgba(37,99,235,.18), transparent 60%),
        radial-gradient(900px 450px at 110% 0%, rgba(14,165,233,.12), transparent 60%),
        var(--bg);
    }

    .wrap {
      width: min(1200px, calc(100% - 32px));
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(8px);
      background: rgba(243, 246, 251, 0.78);
      border-bottom: 1px solid var(--line);
    }

    .topbar .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 68px;
      gap: 18px;
    }

    .brand {
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: .2px;
    }

    .quick-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chip {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      color: var(--muted);
    }

    .hero {
      padding: 26px 0 16px;
    }

    .hero-box {
      background: linear-gradient(140deg, #0f172a 0%, #1e293b 55%, #0f172a 100%);
      color: #e2e8f0;
      border-radius: 24px;
      padding: 24px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .hero-box::after {
      content: "";
      position: absolute;
      width: 420px;
      height: 420px;
      right: -190px;
      top: -210px;
      border-radius: 999px;
      background: radial-gradient(circle at center, rgba(56,189,248,.34), rgba(56,189,248,0));
      pointer-events: none;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(1.35rem, 1rem + 1.6vw, 2.2rem);
      line-height: 1.25;
      color: #fff;
    }

    .hero p {
      margin: 10px 0 0;
      color: #cbd5e1;
      max-width: 830px;
      line-height: 1.6;
    }

    .stats {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .stat {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 14px;
      padding: 10px 12px;
    }

    .stat strong {
      display: block;
      font-size: 1.2rem;
      color: #fff;
    }

    .stat span {
      font-size: .8rem;
      color: #cbd5e1;
    }

    .layout {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      gap: 16px;
      margin-top: 16px;
      padding-bottom: 24px;
    }

    .sidebar {
      position: sticky;
      top: 88px;
      height: fit-content;
      background: rgba(255,255,255,.82);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-soft);
      padding: 14px;
    }

    .sidebar h3 {
      margin: 0 0 10px;
      font-size: .92rem;
    }

    .search {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #fff;
      padding: 10px 12px;
      color: var(--text);
      outline: none;
      font-size: 14px;
    }

    .search:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
    }

    .nav-list {
      margin-top: 10px;
      display: grid;
      gap: 8px;
      max-height: 360px;
      overflow: auto;
      padding-right: 4px;
    }

    .module-btn {
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 10px;
      padding: 10px;
      cursor: pointer;
      transition: .2s;
    }

    .module-btn:hover {
      border-color: #bfdbfe;
      transform: translateY(-1px);
    }

    .module-btn.active {
      border-color: var(--brand);
      background: linear-gradient(180deg, #eff6ff, #ffffff);
      box-shadow: 0 0 0 2px rgba(37,99,235,.12);
    }

    .module-btn small {
      color: var(--muted);
      display: block;
      font-size: .75rem;
    }

    .module-btn strong {
      display: block;
      margin-top: 4px;
      font-size: .9rem;
      line-height: 1.35;
      color: var(--text);
    }

    .content {
      display: grid;
      gap: 14px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-soft);
    }

    .card-body {
      padding: 16px 18px;
    }

    .section-title {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: .2px;
    }

    .module-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 12px;
    }

    .badge {
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      border: 1px solid #bfdbfe;
      color: #1d4ed8;
      background: #eff6ff;
      white-space: nowrap;
    }

    .goal {
      margin: 10px 0 12px;
      color: #334155;
      line-height: 1.7;
      padding: 12px;
      border-radius: 12px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
    }

    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .tab-btn {
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fff;
      padding: 7px 12px;
      font-size: 12px;
      cursor: pointer;
      color: #334155;
    }

    .tab-btn.active {
      border-color: var(--brand);
      color: #1d4ed8;
      background: #eff6ff;
    }

    .steps {
      margin: 0;
      padding-left: 20px;
      display: grid;
      gap: 8px;
      color: #334155;
      line-height: 1.55;
    }

    .deliverable {
      padding: 12px;
      border-radius: 12px;
      border: 1px dashed #94a3b8;
      background: #f8fafc;
      color: #0f172a;
      line-height: 1.6;
    }

    .task {
      margin-top: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border: 1px solid #d1fae5;
      background: #ecfdf5;
      border-radius: 12px;
      color: #065f46;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 10px;
    }

    .material {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: #fff;
      transition: .2s;
    }

    .material:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-soft);
    }

    .material h4 {
      margin: 0;
      font-size: .93rem;
      line-height: 1.4;
    }

    .meta {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    .desc {
      margin-top: 8px;
      font-size: 13px;
      line-height: 1.55;
      color: #334155;
    }

    .links {
      margin-top: 8px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    a.link {
      text-decoration: none;
      font-size: 12px;
      border-radius: 999px;
      padding: 6px 9px;
      border: 1px solid var(--line);
      color: #1e3a8a;
      background: #fff;
    }

    a.link:hover {
      border-color: #93c5fd;
      background: #eff6ff;
    }

    .row-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    .kicker {
      font-size: 12px;
      color: var(--muted);
    }

    .footer {
      margin: 16px 0 24px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 1024px) {
      .layout {
        grid-template-columns: 1fr;
      }
      .sidebar {
        position: static;
      }
      .grid-3 {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 680px) {
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .grid-3 { grid-template-columns: 1fr; }
      .hero-box { padding: 18px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="wrap row">
      <div class="brand">One-Person Company Handbook</div>
      <div class="quick-meta">
        <span class="chip">手册模板</span>
        <span class="chip">教程站优化版</span>
        <span class="chip">更新：2026-03-01</span>
      </div>
    </div>
  </header>

  <section class="hero wrap">
    <div class="hero-box">
      <h1>系统化学习一人公司：从定位到变现</h1>
      <p>参考 GitHub 上高质量文档站的结构思路，重做了视觉层级、目录导航、模块化阅读体验。你可以从左侧目录顺序学习，也可以按素材区快速查资料。</p>
      <div class="stats">
        <div class="stat"><strong id="module-count">--</strong><span>教程模块</span></div>
        <div class="stat"><strong id="youtube-count">--</strong><span>YouTube 文本</span></div>
        <div class="stat"><strong id="x-count">--</strong><span>X 文本</span></div>
        <div class="stat"><strong id="github-count">--</strong><span>GitHub 资源</span></div>
      </div>
    </div>
  </section>

  <main class="wrap layout">
    <aside class="sidebar card">
      <h3>课程目录</h3>
      <input id="search-input" class="search" placeholder="搜索模块或关键词..." />
      <div id="module-nav" class="nav-list"></div>
    </aside>

    <section class="content">
      <article class="card">
        <div class="card-body">
          <div class="module-head">
            <h2 id="module-title" class="section-title">加载中...</h2>
            <span id="module-id" class="badge">-</span>
          </div>
          <p id="module-goal" class="goal"></p>

          <div class="tabs">
            <button class="tab-btn active" data-tab="steps">执行步骤</button>
            <button class="tab-btn" data-tab="deliverable">交付物</button>
            <button class="tab-btn" data-tab="sources">来源映射</button>
          </div>

          <div id="module-tab-content"></div>

          <label class="task">
            <input id="module-done" type="checkbox" />
            <span>标记当前模块已学习完成</span>
          </label>
        </div>
      </article>

      <article class="card">
        <div class="card-body">
          <div class="row-title">
            <h3 class="section-title">YouTube 转文本素材</h3>
            <span class="kicker">视频摘要 + 行动项</span>
          </div>
          <div id="youtube-list" class="grid-3"></div>
        </div>
      </article>

      <article class="card">
        <div class="card-body">
          <div class="row-title">
            <h3 class="section-title">X 转文本素材</h3>
            <span class="kicker">观点摘录 + 可执行动作</span>
          </div>
          <div id="x-list" class="grid-3"></div>
        </div>
      </article>

      <article class="card">
        <div class="card-body">
          <div class="row-title">
            <h3 class="section-title">GitHub 参考项目</h3>
            <span class="kicker">工具链与实现参考</span>
          </div>
          <div id="github-list" class="grid-3"></div>
        </div>
      </article>
    </section>
  </main>

  <div class="wrap footer">
    仓库：<a class="link" href="https://github.com/simonsxxs/opcmode" target="_blank" rel="noopener noreferrer">simonsxxs/opcmode</a>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
